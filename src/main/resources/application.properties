spring.application.name=url-shortener

# -------- Server / lifecycle (production-friendly defaults) --------
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}

# -------- Logging --------
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}
logging.level.com.urlshortener.url_shortener.Service.EmailService=DEBUG
logging.level.org.springframework.mail=DEBUG

# -------- Database --------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# HikariCP tuning (sane small-service defaults)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.pool-name=${DB_POOL_NAME:UrlShortenerHikari}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# -------- Redis (optional cache layer) --------
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${SPRING_DATA_REDIS_CONNECT_TIMEOUT:2s}

# -------- App config --------
app.base-url=${APP_BASE_URL:http://localhost:8080}

# -------- JWT --------
jwt.secret=${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# -------- OpenAPI / Swagger --------
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# -------- Actuator --------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:never}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}

# -------- Email Configuration --------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=anushchinnasamy@gmail.com
spring.mail.password=bowvqdxhtdrmzzrp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email settings
app.email.enabled=true
app.email.from=anushchinnasamy@gmail.com

